<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="icon" href="../images/header-logo.png" type="image/icon type">
    <link rel="stylesheet" href="../css/register.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <nav>
        <div class="logo">
            <img src="../images/logo.png" width="9%" alt="logo">
        </div>
        <div class="menu-bar">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="./books.html">Books</a></li>
                <li><a href="./about_us.html">About us</a></li>
            </ul>
        </div>
        <a href="../pages/login.html"><i class="material-icons icons-color">account_circle</i></a>
    </nav>
    <div class="container-form">
        <form action="register">
            <h1>Register</h1>
            <div class="info">
                <div class="card">
                    <div class="card-input">
                        <label for="First Name">First Name</label>
                        <input type="text">
                    </div>
                    <div class="card-input">
                        <label for="Email">Email</label>
                        <input type="email">
                    </div>
                    <div class="card-input">
                        <label for="Phone Number">Phone Number</label>
                        <input type="text">
                    </div>
                    <div class="card-input">
                        <label for="Gender">Gender</label>
                        <select name="Gender" id="select">
                            <option value="..."></option>
                            <option value="Femle">Femle</option>
                            <option value="Male">Male</option>
                            <option value="Male">...</option>
                        </select>
                    </div>
                </div>
                <div class="card">
                    <div class="card-input">
                        <label for="Last Name">Last Name</label>
                        <input type="text">
                    </div>
                    <div class="card-input">
                        <label for="Date">Date</label>
                        <input type="date">
                    </div>
                    <div class="card-input">
                        <label for="password">Password</label>
                        <input type="password">
                    </div>
                    <div class="card-input">
                        <label for="kind of book"> kinds of book do you choose</label>
                        <select name="book" id="book">
                            <option value="..."></option>
                            <option value="Education">Education</option>
                            <option value="Book Of Legend">Book Of Legend</option>
                            <option value="Gender Knowledge">General Knowledge</option>
                            <option value="Self Development">Self Development Books</option>
                            <option value="Cooking Books">Cooking Books</option>
                            <option value="Technology Books">Technology Books</option>
                            <option value="Financial Books">Financial Books</option>
                            <option value="Leadership Books">Leadership Books</option>
                        </select>
                    </div>
                </div>
            </div>
            <button><a href="../pages/success.html">Register</a></button>
            <div style="text-align:center;margin-top:16px;font-size:14px;color:#777;">
                Already have an account? <a href="./login.html" style="color:#00B9BE;font-weight:700;text-decoration:none;">Login</a>
            </div>
            <h3>OR</h3>
            <div class="icon">
                <a href="../pages/success.html"><img src="../images/follow us/linkedin.png" alt="link"></a>
                <a href="../pages/success.html"><img src="../images/follow us/facebook.png" alt="facebook"></a>
                <a href="../pages/success.html"><img src="../images/follow us/instagram.png" alt="instargram"></a>
                <a href="../pages/success.html"><img src="../images/follow us/twitter.png" alt="twitter"></a>
            </div>
        </form>
    </div>
    <footer>
        <div class="footer-top">
            <div class="footer-left">
                <h3>Contact Us</h3>
                <div class="email">
                    <img src="../images/follow us/email.png" alt="email">
                    <p>lavy.hou@passerellesnumeriques.org</p>
                </div>
                <div class="phone-call">
                    <img src="../images/follow us/phone-call.png" alt="call">
                    <p>071 66 29 129 / 0963955091</p>
                </div>
            </div>
            <div class="footer-center">
                <img src="../images/logo.png" alt="Lavy Library" class="footer-logo">
                <p class="footer-tagline">Accelerating research discovery<br>to shape a better future.</p>
            </div>
            <div class="footer-right">
                <h3>Follow Us</h3>
                <div class="icon">
                    <a href="https://www.linkedin.com/feed/" target="_blank"><img src="../images/follow us/linkedin.png" alt="LinkedIn"></a>
                    <a href="https://www.facebook.com/" target="_blank"><img src="../images/follow us/facebook.png" alt="Facebook"></a>
                    <a href="https://www.instagram.com/" target="_blank"><img src="../images/follow us/instagram.png" alt="Instagram"></a>
                    <a href="https://www.twitter.com/" target="_blank"><img src="../images/follow us/twitter.png" alt="Twitter"></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2025 Lavy Library. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
