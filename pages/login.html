<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Lavy Library</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="icon" href="../images/header-logo.png" type="image/icon type">
    <link rel="stylesheet" href="../css/register.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .login-form {
            max-width: 440px;
        }
        .form-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
        }
        .form-field label {
            font-size: 13px;
            font-weight: 700;
            color: #444;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .form-field input {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            color: #333;
            background: #fafafa;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .form-field input:focus {
            border-color: #00B9BE;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0, 185, 190, 0.12);
        }
        .forgot {
            display: flex;
            justify-content: flex-end;
            margin: -10px 0 20px;
        }
        .forgot a {
            font-size: 13px;
            color: #00B9BE;
            text-decoration: none;
            font-weight: 600;
        }
        .forgot a:hover { text-decoration: underline; }
        .switch-auth {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #777;
        }
        .switch-auth a {
            color: #00B9BE;
            font-weight: 700;
            text-decoration: none;
        }
        .switch-auth a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <img src="../images/logo.png" alt="logo">
        </div>
        <div class="menu-bar">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="./books.html">Books</a></li>
                <li><a href="./about_us.html">About us</a></li>
            </ul>
        </div>
        <a href="./login.html"><i class="material-icons icons-color">account_circle</i></a>
    </nav>

    <div class="container-form">
        <form action="success.html" class="login-form">
            <h1>Login</h1>

            <div class="form-field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>

            <div class="form-field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <div class="forgot">
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit"><a href="./success.html">Login</a></button>

            <h3>OR</h3>

            <div class="icon">
                <a href="./success.html"><img src="../images/follow us/linkedin.png" alt="LinkedIn"></a>
                <a href="./success.html"><img src="../images/follow us/facebook.png" alt="Facebook"></a>
                <a href="./success.html"><img src="../images/follow us/instagram.png" alt="Instagram"></a>
                <a href="./success.html"><img src="../images/follow us/twitter.png" alt="Twitter"></a>
            </div>

            <div class="switch-auth">
                Don't have an account? <a href="./register.html">Register</a>
            </div>
        </form>
    </div>

    <footer>
        <div class="footer-top">
            <div class="footer-left">
                <h3>Contact Us</h3>
                <div class="email">
                    <img src="../images/follow us/email.png" alt="email">
                    <p>lavy.hou@passerellesnumeriques.org</p>
                </div>
                <div class="phone-call">
                    <img src="../images/follow us/phone-call.png" alt="call">
                    <p>071 66 29 129 / 0963955091</p>
                </div>
            </div>
            <div class="footer-center">
                <img src="../images/logo.png" alt="Lavy Library" class="footer-logo">
                <p class="footer-tagline">Accelerating research discovery<br>to shape a better future.</p>
            </div>
            <div class="footer-right">
                <h3>Follow Us</h3>
                <div class="icon">
                    <a href="https://www.linkedin.com/feed/" target="_blank"><img src="../images/follow us/linkedin.png" alt="LinkedIn"></a>
                    <a href="https://www.facebook.com/" target="_blank"><img src="../images/follow us/facebook.png" alt="Facebook"></a>
                    <a href="https://www.instagram.com/" target="_blank"><img src="../images/follow us/instagram.png" alt="Instagram"></a>
                    <a href="https://www.twitter.com/" target="_blank"><img src="../images/follow us/twitter.png" alt="Twitter"></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2025 Lavy Library. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
